server {
    listen 127.0.0.1:8080;
    server_name my_webserv;

    root ./www;
    index index.html;

    client_max_body_size 1000000;

    error_page 400 ./www/errors/400.html;
    error_page 403 ./www/errors/403.html;
    error_page 404 ./www/errors/404.html;
    error_page 405 ./www/errors/405.html;
    error_page 413 ./www/errors/413.html;
    error_page 500 ./www/errors/500.html;

    location / {
        methods GET;
        root ./www;
        index index.html;
        autoindex off;
    }

    location /public {
        methods GET;
        root ./www/public;
        index index.html;
        autoindex on;
    }

    location /upload {
        methods GET POST DELETE;
        root ./www/upload_page;
        index upload.html;
        autoindex on;

        upload on;
        upload_store ./www/uploads;
    }

    location /old {
        methods GET;
        return 301 /;
    }

    location /cgi-bin {
        methods GET POST;
        root ./www/cgi-bin;
        index index.py;
        autoindex off;

        cgi_extension .py;
        cgi_path /usr/bin/python3;
    }
}